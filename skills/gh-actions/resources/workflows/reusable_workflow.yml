# Caller example:
# jobs:
#   call-build:
#     uses: my-org/shared-workflows/.github/workflows/node-build.yml@v1
#     with:
#       node-version: '20'
#     secrets:
#       NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

on:
  workflow_call:
    inputs:
      node-version:
        type: string
        required: true
    secrets:
      NPM_TOKEN:
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
      - run: npm ci
