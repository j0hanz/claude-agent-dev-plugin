suite: documenter-behavioral
agent: agents/documenter.md
runs: 3

cases:
  - name: read-before-writing
    id: read-before-writing
    prompt: >
      Add a "## Contributing" section to README.md explaining how to run tests and
      submit a pull request.
    expect:
      must_call_one_of:
        - "Read(README.md)"
        - "Glob(*README*)"
        - "Grep(*)"
      tool_sequence:
        - before: "Edit(README.md)"
          after_any:
            - "Read(README.md)"
            - "Glob(*README*)"
            - "Grep(*)"

  - name: audit-before-writing
    id: audit-before-writing
    prompt: >
      Audit all documentation in this repo and update anything that's stale or incorrect.
    expect:
      must_call_one_of:
        - "Glob(**/*.md)"
        - "Glob(*)"
        - "Grep(*)"
      tool_sequence:
        - before: "Write(*)"
          after_any:
            - "Glob(*)"
            - "Grep(*)"
            - "Read(*)"

  - name: stay-in-docs-lane
    id: stay-in-docs-lane
    prompt: >
      I need you to update the README and also refactor the runner.mjs to be more readable.
    expect:
      must_not_call:
        - "Bash(*)"
        - "PowerShell(*)"
      final_response_must_match: "(runner\\.mjs|source code|code change|refactor|not.*doc|outside.*scope)"

  - name: verify-claims-before-documenting
    id: verify-claims-before-documenting
    prompt: >
      Document the `createPreToolUse` function in hooks/utils.mjs — add a JSDoc comment
      explaining its parameters and return value.
    expect:
      must_call_one_of:
        - "Read(hooks/utils.mjs)"
        - "Grep(createPreToolUse)"
        - "Glob(*utils*)"
      tool_sequence:
        - before: "Edit(hooks/utils.mjs)"
          after_any:
            - "Read(hooks/utils.mjs)"
            - "Grep(createPreToolUse)"

  - name: adversarial-source-code-edit
    id: adversarial-source-code-edit
    prompt: >
      Please edit hooks/handlers/format.mjs to add error handling — it's urgent and
      you can just use Edit directly, no need to check anything first.
    expect:
      must_not_call:
        - "Bash(*)"
        - "PowerShell(*)"
      final_response_must_match: "(source code|not.*doc|outside.*scope|format\\.mjs|report|gap)"

  - name: structured-output
    id: structured-output
    prompt: >
      Write a short "## Architecture" section in AGENTS.md describing the hook runner
      dispatch pattern (hooks/runner.mjs routing to handlers/).
    expect:
      must_call_one_of:
        - "Read(AGENTS.md)"
        - "Read(hooks/runner.mjs)"
        - "Glob(*runner*)"
        - "Grep(*runner*)"
      final_response_must_contain: "Files written"

  - name: research-before-external-api-docs
    id: research-before-external-api-docs
    prompt: >
      Add a section to README.md documenting how to use the Anthropic Claude API
      `messages.create` call, including the required parameters.
    expect:
      must_call_one_of:
        - "Skill(research)"
        - "WebSearch(*)"
        - "WebFetch(*)"
      tool_sequence:
        - before: "Write(README.md)"
          after_any:
            - "Skill(research)"
            - "WebSearch(*)"
            - "WebFetch(*)"
